name: strobilus
description: "A pine cone collector app — discover, photograph, identify, catalog, and map your collection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  firebase_analytics: ^11.4.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Networking
  dio: ^5.8.0+1
  flutter_dotenv: ^5.2.1

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # Images
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Audio — Voice Notes
  record: ^5.2.1
  audioplayers: ^6.1.0

  # Animations & UI
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^18.0.1

  # Logging
  logger: ^2.5.0
  camera: ^0.12.0+1
  confetti: ^0.8.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  image: any
dependency_overrides:
  record_linux: ^1.3.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/species/
    - assets/images/icons/
    - assets/animations/
    - assets/data/
    - .env

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Regular.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Regular.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Regular.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Italic.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 700
